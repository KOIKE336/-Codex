<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">日常業務用AGENTS.mdの作り方</title>
  <desc id="desc">Codex用の作業フォルダ直下にAGENTS.mdを作り、Daily Work Agentのテンプレートを貼って保存し、Codexへ作業を依頼する流れ。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8f7ef"/>
      <stop offset="55%" stop-color="#edf5f2"/>
      <stop offset="100%" stop-color="#fff4d7"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f8a83"/>
      <stop offset="100%" stop-color="#0b6661"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#172033" flood-opacity="0.16"/>
    </filter>
    <style>
      .title { font: 800 46px "Hiragino Sans", "Noto Sans JP", sans-serif; fill: #172033; }
      .lead { font: 500 22px "Hiragino Sans", "Noto Sans JP", sans-serif; fill: #5b6476; }
      .label { font: 800 19px "Hiragino Sans", "Noto Sans JP", sans-serif; fill: #172033; }
      .small { font: 600 16px "Hiragino Sans", "Noto Sans JP", sans-serif; fill: #5b6476; }
      .code { font: 600 18px "SFMono-Regular", "Menlo", monospace; fill: #253047; }
      .code-small { font: 600 15px "SFMono-Regular", "Menlo", monospace; fill: #253047; }
      .code-invert { font: 600 18px "SFMono-Regular", "Menlo", monospace; fill: #ffffff; }
      .code-invert-small { font: 600 15px "SFMono-Regular", "Menlo", monospace; fill: #e8edf4; }
      .badge { font: 800 15px "Hiragino Sans", "Noto Sans JP", sans-serif; fill: #ffffff; letter-spacing: .06em; }
      .num { font: 900 24px "Avenir Next", "Hiragino Sans", sans-serif; fill: #ffffff; }
      .hint { font: 800 17px "Hiragino Sans", "Noto Sans JP", sans-serif; fill: #0b6661; }
    </style>
  </defs>

  <rect width="1280" height="760" rx="0" fill="url(#bg)"/>
  <circle cx="1080" cy="110" r="150" fill="#f2b84b" opacity=".16"/>
  <circle cx="150" cy="650" r="210" fill="#0f8a83" opacity=".09"/>

  <text x="70" y="86" class="title">日常業務用 AGENTS.md の作り方</text>
  <text x="72" y="126" class="lead">「Daily Work Agent」を、作業フォルダ直下の AGENTS.md に貼るだけでOKです。</text>

  <g filter="url(#shadow)">
    <rect x="70" y="170" width="330" height="430" rx="28" fill="#ffffff" opacity=".96"/>
    <rect x="98" y="200" width="122" height="30" rx="15" fill="url(#teal)"/>
    <text x="116" y="221" class="badge">STEP 1</text>
    <text x="98" y="270" class="label">作業フォルダを1つ作る</text>
    <text x="98" y="308" class="small">まずは、Codex用の置き場所を</text>
    <text x="98" y="334" class="small">1つだけ作ります。</text>

    <rect x="98" y="374" width="244" height="142" rx="18" fill="#f6f7f3" stroke="#d9ded4"/>
    <text x="122" y="416" class="code">Codex_Workspace/</text>
    <text x="146" y="455" class="code-small">├─ AGENTS.md</text>
    <text x="146" y="486" class="code-small">├─ 01_sources/</text>
    <text x="146" y="517" class="code-small">└─ 04_outputs/</text>
    <text x="98" y="558" class="hint">置き場所は“直下”がポイント</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="475" y="170" width="330" height="430" rx="28" fill="#ffffff" opacity=".96"/>
    <rect x="503" y="200" width="122" height="30" rx="15" fill="url(#teal)"/>
    <text x="521" y="221" class="badge">STEP 2</text>
    <text x="503" y="270" class="label">AGENTS.mdを作って貼る</text>
    <text x="503" y="308" class="small">下のテンプレを丸ごとコピーして</text>
    <text x="503" y="334" class="small">AGENTS.mdに貼り付けます。</text>

    <rect x="503" y="374" width="244" height="174" rx="18" fill="#172033"/>
    <text x="526" y="414" class="code-invert">## Daily Work Agent</text>
    <text x="526" y="454" class="code-invert-small">- ゴールを1文で確認</text>
    <text x="526" y="486" class="code-invert-small">- 前提を明示</text>
    <text x="526" y="518" class="code-invert-small">- Markdown優先</text>
    <text x="503" y="588" class="hint">編集せず、最初はそのままでOK</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="880" y="170" width="330" height="430" rx="28" fill="#ffffff" opacity=".96"/>
    <rect x="908" y="200" width="122" height="30" rx="15" fill="url(#teal)"/>
    <text x="926" y="221" class="badge">STEP 3</text>
    <text x="908" y="270" class="label">そのフォルダでCodexに依頼</text>
    <text x="908" y="308" class="small">AGENTS.mdがある場所を基準に</text>
    <text x="908" y="334" class="small">Codexへ作業を頼みます。</text>

    <rect x="908" y="374" width="244" height="142" rx="18" fill="#fff7e5" stroke="#f2d18a"/>
    <text x="932" y="418" class="code-small">例:</text>
    <text x="932" y="455" class="code-small">このフォルダの</text>
    <text x="932" y="486" class="code-small">資料を要約して、</text>
    <text x="932" y="517" class="code-small">Markdownで保存して</text>
    <text x="908" y="558" class="hint">Codexがルールを読みやすくなる</text>
  </g>

  <path d="M410 385 C438 385 443 385 465 385" fill="none" stroke="#0f8a83" stroke-width="6" stroke-linecap="round"/>
  <path d="M452 371 L472 385 L452 399" fill="none" stroke="#0f8a83" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M815 385 C843 385 848 385 870 385" fill="none" stroke="#0f8a83" stroke-width="6" stroke-linecap="round"/>
  <path d="M857 371 L877 385 L857 399" fill="none" stroke="#0f8a83" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="92" y="638" width="1096" height="78" rx="32" fill="#172033" opacity=".92"/>
  <text x="138" y="681" class="badge">結論:</text>
  <circle cx="242" cy="676" r="18" fill="#0f8a83"/>
  <text x="235" y="684" class="num">1</text>
  <text x="274" y="682" class="badge">AGENTS.mdを直下に作る</text>
  <circle cx="565" cy="676" r="18" fill="#0f8a83"/>
  <text x="558" y="684" class="num">2</text>
  <text x="597" y="682" class="badge">テンプレを貼る</text>
  <circle cx="820" cy="676" r="18" fill="#0f8a83"/>
  <text x="813" y="684" class="num">3</text>
  <text x="852" y="682" class="badge">そのフォルダで依頼する</text>
</svg>
